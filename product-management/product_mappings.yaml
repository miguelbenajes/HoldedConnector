    - name: "project_id"
      type: "String"
      description: "Link expense to specific project for tracking"
      optional: true
      example: "BIR17235"

  amortizations:
    - name: "purchase_price"
      type: "Numeric"
      description: "Original cost of the equipment"

    - name: "purchase_date"
      type: "Date"
      description: "When the equipment was purchased"

    - name: "notes"
      type: "Text"
      description: "Free text notes about the amortization"

##############################################################################
# FUTURE AUTOMATION PATTERNS
##############################################################################

automation_opportunities:
  - pattern: "ALQ .+"
    description: "ALQ prefix likely means rental/loan"
    action: "Try to match against existing inventory; if match, link to amortization"
    confidence: "Medium"

  - pattern: "Dinner|Cena|Glovo|Taxi|Parking"
    description: "Known expense keywords"
    action: "Automatically classify as Expense"
    confidence: "High"

  - pattern: "OT \\d+ hours? on .+"
    description: "Overtime entries with hours and date"
    action: "Extract hours and date; classify as Service with hourly rate"
    confidence: "High"
    note: "Currently 0 detected in data, but pattern ready for future"

