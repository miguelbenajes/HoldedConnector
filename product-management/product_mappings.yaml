# Product Mapping Rules & Learning File
# Purpose: Document product classification decisions and learned patterns for future automations
# Last Updated: 2026-03-02

##############################################################################
# CLASSIFICATION RULES
##############################################################################

classification_rules:
  real_products:
    description: "Physical inventory items - equipment, materials, tools, hardware"
    keywords:
      - "adapter"
      - "camera"
      - "lens"
      - "battery"
      - "cable"
      - "filter"
      - "reflector"
      - "light"
      - "stand"
      - "tripod"
      - "kit"
    examples:
      - "E200 Spigot adapter 16-29mm"
      - "Nikon D850"
      - "Canon 70-200mm lens"

  services:
    description: "Time-based services, labor, consulting, fees (becomes 'fee' product type in Holded)"
    keywords:
      - "session"
      - "consultation"
      - "labor"
      - "hora"
      - "hour"
      - "photography"
      - "assistance"
    examples:
      - "Photo session 2 hours"
      - "Consulting project"
      - "Labor - setup and takedown"

  expenses:
    description: "Operating costs, non-inventory items (becomes 'expense' type in Holded)"
    keywords:
      - "taxi"
      - "parking"
      - "petrol"
      - "fuel"
      - "courier"
      - "shipping"
      - "dinner"
      - "cena"
      - "glovo"
      - "transport"
      - "food"
    special_rules:
      - name: "Dinner entries"
        pattern: "Dinner .* \\d{1,2}-\\d{1,2}-\\d{4}"
        action: "Classify as Expense"
        reason: "Operating cost, not inventory"
        example: "Dinner Thursday 12-9-2024"
    examples:
      - "Taxi a Estacion Sants"
      - "Parking tickets 15€ + 9€ + 8€"
      - "Dinner Friday 13-9-2024"

  administrative:
    description: "Notes, project codes, references - should be IGNORED/DELETED"
    keywords:
      - "project"
      - "anulacion"
      - "annulation"
      - "invoice"
      - "reference"
      - "code"
    examples:
      - "Project name: BIR17235"
      - "Invoice reference ABC123"
      - "Transavia booking"

##############################################################################
# PRODUCT LINKING RULES
##############################################################################

product_links:
  "ALQ MACBOOK":
    description: "Rental/loan of MacBook Pro Max M3"
